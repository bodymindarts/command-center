[package]
name = "command-center"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "clat"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
minijinja = "2"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
anyhow = "1"
tabled = "0.17"
ratatui = "0.29"
crossterm = "0.28"

[dev-dependencies]
tempfile = "3"
